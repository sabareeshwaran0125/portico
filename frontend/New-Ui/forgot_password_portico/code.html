<!-- Backdrop blur overlay for extra depth -->
<div class="absolute inset-0 bg-brand-indigo/10 backdrop-blur-[2px]"></div>
<div class="auth-card relative z-10 w-full max-w-md bg-white rounded-xl p-8 md:p-10 flex flex-col items-center">
<!-- Branding Section -->
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 bg-brand-indigo rounded-xl flex items-center justify-center mb-4 transition-transform hover:scale-105 duration-300">
<span class="material-symbols-outlined text-primary-container text-4xl" style="font-variation-settings: 'FILL' 1;">apartment</span>
</div>
<h1 class="font-display-lg text-brand-indigo tracking-tight">Portico</h1>
</div>
<!-- Heading & Instructions -->
<div class="text-center mb-8">
<h2 class="font-headline-md text-on-background mb-3">Reset your password</h2>
<p class="font-body-md text-secondary leading-relaxed">
                    Enter your email address and we'll send you a link to reset your password.
                </p>
</div>
<!-- Form Section -->
<form class="w-full space-y-6" onsubmit="event.preventDefault();">
<div class="space-y-2">
<label class="font-label-lg text-on-surface-variant block" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all outline-none text-on-surface placeholder:text-outline/60" id="email" name="email" placeholder="name@example.com" required="" type="email">
</div>
</div>
<button class="w-full bg-primary-container hover:bg-primary text-white font-label-lg py-4 rounded-lg shadow-sm transition-all transform active:scale-[0.98] flex items-center justify-center gap-2 group" type="submit">
<span class="">Send Reset Link</span>
<span class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</form>
<!-- Navigation Links -->
<div class="mt-8 flex flex-col items-center">
<a class="font-label-lg text-primary hover:text-on-primary-fixed-variant transition-colors flex items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-lg transition-transform group-hover:-translate-x-1">arrow_back</span>
                    Back to Sign In
                </a>
</div>
</div>
</main>
<!-- Global Footer -->
<footer class="w-full py-6 px-8 flex justify-center items-center bg-transparent relative z-20">

<a class="hover:text-white transition-colors underline decoration-white/20 underline-offset-4" href="#">Privacy Policy</a>
<a class="hover:text-white transition-colors underline decoration-white/20 underline-offset-4" href="#">Terms of Service</a>
</div>
</div>
</footer>
<!-- Micro-interaction Scripts -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form');
            const button = form.querySelector('button');
            const btnText = button.querySelector('span:first-child');
            const btnIcon = button.querySelector('.material-symbols-outlined');

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                // Visual Feedback for click
                button.disabled = true;
                btnText.textContent = 'Sending...';
                btnIcon.textContent = 'autorenew';
                btnIcon.classList.add('animate-spin');

                setTimeout(() => {
                    button.classList.remove('bg-primary-container');
                    button.classList.add('bg-tertiary-container');
                    btnText.textContent = 'Link Sent!';
                    btnIcon.textContent = 'check_circle';
                    btnIcon.classList.remove('animate-spin');
                    
                    // Simple alert for demo
                    console.log("Reset link request sent for:", document.getElementById('email').value);
                }, 1500);
            });
        });
    </script>
